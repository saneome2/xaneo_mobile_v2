name: Mobile CI/CD Build & Release

on:
  push:
    tags:
      - 'v*' # Запуск сборки и выкладки только при пуше тегов (например, v1.0.0, v2.1.3-beta)
  workflow_dispatch: # Позволяет запускать сборку вручную из интерфейса GitHub Actions

permissions:
  contents: write

jobs:
  # --- Сборка для Android ---
  build-android:
    name: Build Android APK & AAB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Code Generation (Drift database classes)
        run: dart run build_runner build --delete-conflicting-outputs

      # Сборка отдельных APK файлов для каждой процессорной архитектуры (ARM 32-bit, ARM 64-bit, x86_64)
      - name: Build APKs (armeabi-v7a, arm64-v8a, x86_64)
        run: flutter build apk --split-per-abi --release

      # Сборка общего Android App Bundle (AAB) для загрузки в Google Play
      - name: Build App Bundle (AAB)
        run: flutter build appbundle --release

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-builds
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab

  # --- Сборка для iOS ---
  build-ios:
    name: Build iOS IPA (Unsigned)
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch camera_avfoundation for Xcode 16 / iOS 18 compatibility
        run: |
          SWIFT_FILE=$(find ~/.pub-cache -name "DefaultCamera.swift" | head -1)
          if [ -n "$SWIFT_FILE" ]; then
            echo "Patching $SWIFT_FILE..."
            sed -i '' \
              -e 's/AVCaptureSession\.wasInterruptedNotification/NSNotification.Name("AVCaptureSessionWasInterruptedNotification")/g' \
              -e 's/AVCaptureSession\.runtimeErrorNotification/NSNotification.Name("AVCaptureSessionRuntimeErrorNotification")/g' \
              "$SWIFT_FILE"
          else
            echo "DefaultCamera.swift not found in pub cache"
          fi

      - name: Run Code Generation (Drift database classes)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      # Сборка без подписи (идеально для CI/CD, подпись выполняется при релизе с помощью сертификатов)
      - name: Build iOS App (No Codesign)
        run: flutter build ios --no-codesign --release

      # Упаковываем Runner.app в Payload/Runner.app и архивируем в .ipa
      - name: Package Unsigned IPA
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r xaneo_mobile_unsigned.ipa Payload

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-build
          path: build/ios/iphoneos/xaneo_mobile_unsigned.ipa

  # --- Сборка для ОС Аврора (Sailfish OS) ---
  build-aurora:
    name: Build Aurora OS RPM Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Code Generation (Drift database classes)
        run: dart run build_runner build --delete-conflicting-outputs

      # Инструкции и шаблон для сборки RPM-пакетов под архитектуры armv7hl (32-bit ARM) и aarch64 (64-bit ARM)
      - name: Build Aurora OS RPMs
        run: |
          echo "=== Настройка Aurora Platform SDK (PSDK) ==="
          # В реальной CI/CD инфраструктуре ОС Аврора используется либо self-hosted Linux-раннер с настроенным PSDK,
          # либо Docker-образ, содержащий PSDK и CLI-инструмент `flutter-aurora`.
          #
          # Основные шаги сборки под целевые архитектуры процессоров:
          # 1. Установка PSDK_DIR:
          #    export PSDK_DIR=/opt/aurora-psdk
          #
          # 2. Компиляция RPM-пакетов с помощью flutter-aurora:
          #    - Сборка под 32-битные ARM процессоры (armv7hl):
          #      flutter-aurora build aurora --release --arch=armv7hl
          #    - Сборка под 64-битные ARM процессоры (aarch64):
          #      flutter-aurora build aurora --release --arch=aarch64
          #    - Сборка под x86 (для эмулятора Аврора):
          #      flutter-aurora build aurora --release --arch=i486
          #
          # В данном шаблоне мы выводим информацию и логируем готовность структуры:
          echo "Архитектуры процессоров ОС Аврора:"
          echo "  - armv7hl (устройства: QMP, INOI и др.)"
          echo "  - aarch64 (устройства: Fplus, Aquarius и др.)"
          echo "  - i486 (эмуляторы внутри VirtualBox)"
          echo "Готовность к компиляции подтверждена."

  # --- Автоматическая публикация Релиза на GitHub ---
  create-release:
    name: Create GitHub Release
    needs: [build-android, build-ios, build-aurora]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') # Убеждаемся, что запуск произошел по тегу
    steps:
      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release-builds
          path: android-build

      - name: Download iOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ios-release-build
          path: ios-build

      # Создание релиза на GitHub и автоматическая загрузка всех бинарников (APK, AAB, IPA)
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            android-build/**/*.apk
            android-build/**/*.aab
            ios-build/**/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
